<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3EE;font-family:'DM Sans',system-ui,sans-serif}
#loading{position:fixed;inset:0;background:#1B2B4B;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:16px;z-index:9999;transition:opacity .4s ease}
#loading.out{opacity:0;pointer-events:none}
#loading p{color:rgba(255,255,255,.45);font-size:13px}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);
  border-top-color:#0D9488;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D6CEC4;border-radius:10px}
textarea:focus,input:focus{outline:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes d1{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes d2{0%,70%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes d3{0%,80%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse-ring{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(2.2)}}
.fu{animation:fadeUp .3s ease both}
.fi{animation:fadeIn .25s ease both}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><p>Iniciando AnatomIA…</p></div>
<div id="root"></div>

// ── API call — va a /api/chat (el proxy de Vercel, sin API key en el front) ──
async function callAgent(agentId, msgs, ctx=""){
  const ag=AGENTS[agentId];
  const sys=ag.system+(ctx?"\n\nContexto del caso activo:\n"+ctx:"");
  const r=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"",
      max_tokens:600,
      system:sys,
      messages:msgs.filter(m=>m.role==="user"||m.role==="assistant")
                   .map(m=>({role:m.role,content:m.content})),
    }),
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||r.status);}
  const d=await r.json();
  return d.content?.[0]?.text??"Sin respuesta.";
}

// ── Shared components ────────────────────────────────────────────────────────
function AgBtn({ag,active,onClick}){

    <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:6,
      padding:"7px 13px",borderRadius:999,
      border:`1.5px solid ${active?ag.c:C.border}`,

      <Ico d={IC[ag.icon]} size={13} color={active?ag.c:C.stone}/>

    </button>
  );
}

function Dots({color}){
  return(

function Input({value,onChange,onSend,placeholder,ac,disabled}){
  return(
    <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
      <textarea value={value} onChange={onChange} rows={2}
        onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();onSend();}}}
        placeholder={placeholder}
        style={{flex:1,background:C.bg,border:`1.5px solid ${C.border}`,
          borderRadius:12,color:C.navy,padding:"10px 14px",fontSize:13,
          resize:"none",minHeight:44,maxHeight:120,lineHeight:1.55,
          fontFamily:"'DM Sans',sans-serif",transition:"border-color .15s"}}
        onFocus={e=>{e.target.style.borderColor=ac+"80"}}
        onBlur={e=>{e.target.style.borderColor=C.border}}/>
      <button onClick={onSend} disabled={disabled||!value.trim()} style={{
        width:44,height:44,borderRadius:12,border:"none",
        background:disabled||!value.trim()?C.stoneL:ac,
        color:disabled||!value.trim()?C.txt3:"#fff",
        cursor:disabled||!value.trim()?"not-allowed":"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",
        flexShrink:0,transition:"all .15s"}}>
        <Ico d={IC.send} size={15} color={disabled||!value.trim()?C.txt3:"#fff"}/>
      </button>
    </div>
  );
}

                  {t.tags.slice(0,3).map(tg=>(
                    <span key={tg} style={{fontSize:10,color:t.c,background:t.l,
                      padding:"2px 8px",borderRadius:999,fontWeight:500}}>{tg}</span>
                  ))}
                </div>
                <div style={{paddingTop:10,borderTop:`1px solid ${C.borderL}`,
                  display:"flex",alignItems:"center",gap:5}}>
                  <Ico d={IC.book} size={11} color={C.stone}/>
                  <span style={{fontSize:11,color:C.stone,fontStyle:"italic"}}>{t.caso.title}</span>
                </div>
              </div>
            </div>
          ))}
        </div>

        <p style={{marginTop:24,fontSize:11,color:C.txt3,textAlign:"center",lineHeight:1.7}}>
          AnatomIA complementa tus clases. No reemplaza la instrucción formal,
          el cadáver ni la supervisión de tus docentes.
        </p>
      </div>
    </div>
  );
}

// ── SESSION ───────────────────────────────────────────────────────────────────
function Session({topic,onBack}){
  const [agId,setAgId]=useState("claude");
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const chatEl=useRef(null);
  const ag=AGENTS[agId];
  const ctx=topic.caso.vig+"\n"+topic.caso.q;

  useEffect(()=>{
    setMsgs([{id:0,role:"assistant",agentId:"claude",
      content:`Hola. Estoy aquí para ayudarte a reforzar **${topic.name}** fuera del aula.\n\nPuedes explorar el caso clínico, preguntar sobre cualquier concepto del sistema, o simplemente resolver lo que no quedó claro en clase. Sin estructura obligatoria.`}]);
  },[topic]);

  useEffect(()=>{
    if(chatEl.current)chatEl.current.scrollTop=chatEl.current.scrollHeight;
  },[msgs,loading]);

  const send=useCallback(async(text)=>{
    const msg=(text||input).trim();
    if(!msg||loading)return;
    setInput("");setErr("");
    const updated=[...msgs,{id:Date.now(),role:"user",content:msg}];
    setMsgs(updated);setLoading(true);
    try{
      const reply=await callAgent(agId,updated,ctx);
      setMsgs(m=>[...m,{id:Date.now()+1,role:"assistant",agentId:agId,content:reply}]);
    }catch(e){
      setErr(e.message||"Error de conexión");
      setMsgs(m=>[...m,{id:Date.now()+1,role:"assistant",agentId:agId,
        content:"No pude conectarme. Intenta de nuevo en un momento."}]);
    }
    setLoading(false);
  },[input,msgs,loading,agId,ctx]);

  return(
    <div style={{background:C.bg,height:"100vh",display:"flex",
      flexDirection:"column",overflow:"hidden"}}>
      {/* Top bar */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:5,
          background:C.stoneL,border:"none",borderRadius:8,color:C.stone,
          cursor:"pointer",padding:"6px 10px",fontSize:12,fontWeight:500}}>
          <Ico d={IC.back} size={13} color={C.stone}/>Inicio
        </button>
        <div style={{flex:1,minWidth:0}}>
          <span style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:14,
            fontWeight:500,color:C.navy}}>{topic.name}</span>
          <span style={{fontSize:11,color:C.txt3,marginLeft:8}}>
            Sesión de apoyo · fuera del aula
          </span>
        </div>
        <div style={{display:"flex",gap:5}}>
          {Object.values(AGENTS).map(a=>(
            <AgBtn key={a.id} ag={a} active={agId===a.id} onClick={()=>setAgId(a.id)}/>
          ))}
        </div>
      </div>

      {/* 2 col */}
      <div style={{flex:1,display:"grid",gridTemplateColumns:"310px 1fr",
        overflow:"hidden",minHeight:0}}>

        {/* Left panel */}
        <div style={{borderRight:`1px solid ${C.border}`,display:"flex",
          flexDirection:"column",background:C.bg,overflow:"hidden"}}>
          <div style={{flex:1,overflowY:"auto",padding:16}}>
            {/* Case */}
            <div style={{background:C.card,border:`1px solid ${C.border}`,
              borderLeft:`3px solid ${topic.c}`,borderRadius:12,
              padding:"14px 16px",marginBottom:12}}>
              <p style={{fontSize:9,fontWeight:700,color:topic.c,
                letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:8}}>
                Caso Clínico
              </p>
              <p style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:13,
                fontWeight:500,color:C.navy,marginBottom:8,lineHeight:1.5}}>
                {topic.caso.title}
              </p>
              <p style={{fontSize:12,color:C.txt2,lineHeight:1.75,fontStyle:"italic"}}>
                {topic.caso.vig}
              </p>
            </div>

            {/* Starter */}
            <div style={{background:C.card,border:`1px solid ${C.border}`,
              borderRadius:12,padding:"12px 14px",marginBottom:12}}>
              <p style={{fontSize:9,fontWeight:700,color:C.stone,letterSpacing:"0.5px",
                textTransform:"uppercase",marginBottom:6}}>Punto de partida sugerido</p>
              <p style={{fontSize:12,color:C.navy,lineHeight:1.6,marginBottom:10}}>
                {topic.caso.q}
              </p>
              <button onClick={()=>send(topic.caso.q)} style={{
                width:"100%",padding:"8px",borderRadius:8,
                border:`1px dashed ${topic.c}60`,background:topic.l,
                color:topic.c,fontSize:12,fontWeight:500,cursor:"pointer"}}
                onMouseEnter={e=>{e.target.style.borderStyle="solid"}}
                onMouseLeave={e=>{e.target.style.borderStyle="dashed"}}>
                Enviar esta pregunta →
              </button>
            </div>

            {/* Tags */}
            <div style={{background:C.card,border:`1px solid ${C.border}`,
              borderRadius:12,padding:"12px 14px"}}>
              <p style={{fontSize:9,fontWeight:700,color:C.stone,letterSpacing:"0.5px",
                textTransform:"uppercase",marginBottom:8}}>Temas del sistema</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {topic.tags.map(tg=>(
                  <button key={tg} onClick={()=>send(`Explícame brevemente: ${tg}`)} style={{
                    fontSize:11,color:topic.c,background:topic.l,
                    border:`1px solid ${topic.c}25`,padding:"4px 10px",
                    borderRadius:999,cursor:"pointer",transition:"all .12s"}}
                    onMouseEnter={e=>{e.target.style.background=topic.c;e.target.style.color="#fff"}}
                    onMouseLeave={e=>{e.target.style.background=topic.l;e.target.style.color=topic.c}}>
                    {tg}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Agent footer */}
          <div style={{borderTop:`1px solid ${C.border}`,padding:"11px 16px",
            display:"flex",alignItems:"center",gap:10,background:ag.l,flexShrink:0}}>
            <div style={{width:32,height:32,borderRadius:8,background:ag.b,
              display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Ico d={IC[ag.icon]} size={15} color={ag.c}/>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:ag.c}}>{ag.name}</div>
              <div style={{fontSize:10,color:C.stone}}>{ag.tagline}</div>
            </div>
          </div>
        </div>

        {/* Right: chat */}
        <div style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div ref={chatEl} style={{flex:1,overflowY:"auto",padding:16,
            display:"flex",flexDirection:"column",gap:12}}>
            {err&&<ErrBanner msg={`Error: ${err}`}/>}
            {msgs.map(m=>(
              <Bubble key={m.id} m={m} isUser={m.role==="user"} agentId={m.agentId||agId}/>
            ))}
            {loading&&(
              <div className="fi" style={{alignSelf:"flex-start"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                  <Ico d={IC[ag.icon]} size={11} color={ag.c}/>
                  <span style={{fontSize:11,fontWeight:600,color:ag.c}}>{ag.name}</span>
                </div>
                <div style={{background:C.card,border:`1px solid ${C.border}`,
                  borderRadius:"3px 14px 14px 14px",padding:"12px 18px"}}>
                  <Dots color={ag.c}/>
                </div>
              </div>
            )}
          </div>

          {/* Quick suggestions */}
          <div style={{padding:"7px 16px",borderTop:`1px solid ${C.borderL}`,
            display:"flex",gap:6,overflowX:"auto",flexShrink:0}}>
            {QUICK_Q.map((q,i)=>(
              <button key={i} onClick={()=>send(q)} style={{
                fontSize:11,color:C.stone,background:C.stoneL,
                border:`1px solid ${C.border}`,borderRadius:999,
                padding:"4px 10px",cursor:"pointer",whiteSpace:"nowrap",
                flexShrink:0,transition:"all .12s"}}
                onMouseEnter={e=>{e.target.style.background=ag.l;e.target.style.color=ag.c;e.target.style.borderColor=ag.c+"50"}}
                onMouseLeave={e=>{e.target.style.background=C.stoneL;e.target.style.color=C.stone;e.target.style.borderColor=C.border}}>
                {q}
              </button>
            ))}
          </div>

          {/* Input */}
          <div style={{borderTop:`1px solid ${C.border}`,padding:"12px 16px",
            flexShrink:0,background:C.card}}>
            <Input value={input} onChange={e=>setInput(e.target.value)}
              onSend={()=>send()} placeholder={`Pregunta a ${ag.name} sobre ${topic.name}…`}
              ac={ag.c} disabled={loading}/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── FREE QUERY ────────────────────────────────────────────────────────────────
function FreeQuery({onBack}){
  const [agId,setAgId]=useState("claude");
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const chatEl=useRef(null);
  const ag=AGENTS[agId];

  useEffect(()=>{
    setMsgs([{id:0,role:"assistant",agentId:"claude",
      content:"Hola. Puedes preguntarme cualquier duda de anatomía — sin estructura, sin caso, sin presión. Estoy aquí para ayudarte a reforzar lo que viste en clase."}]);
  },[]);

  useEffect(()=>{
    if(chatEl.current)chatEl.current.scrollTop=chatEl.current.scrollHeight;
  },[msgs,loading]);

  const send=useCallback(async(text)=>{
    const msg=(text||input).trim();
    if(!msg||loading)return;
    setInput("");
    const updated=[...msgs,{id:Date.now(),role:"user",content:msg}];
    setMsgs(updated);setLoading(true);
    try{
      const reply=await callAgent(agId,updated,"");
      setMsgs(m=>[...m,{id:Date.now()+1,role:"assistant",agentId:agId,content:reply}]);
    }catch(e){
      setMsgs(m=>[...m,{id:Date.now()+1,role:"assistant",agentId:agId,
        content:"Error de conexión. Intenta de nuevo."}]);
    }
    setLoading(false);
  },[input,msgs,loading,agId]);

  return(
    <div style={{background:C.bg,height:"100vh",display:"flex",
      flexDirection:"column",overflow:"hidden"}}>
      {/* Top bar */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,
        padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:5,
          background:C.stoneL,border:"none",borderRadius:8,color:C.stone,
          cursor:"pointer",padding:"6px 10px",fontSize:12,fontWeight:500}}>
          <Ico d={IC.back} size={13} color={C.stone}/>Inicio
        </button>
        <div style={{flex:1}}>
          <span style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:14,
            fontWeight:500,color:C.navy}}>Consulta libre</span>
          <span style={{fontSize:11,color:C.txt3,marginLeft:8}}>
            Cualquier duda de anatomía
          </span>
        </div>
        <div style={{display:"flex",gap:5}}>
          {Object.values(AGENTS).map(a=>(
            <AgBtn key={a.id} ag={a} active={agId===a.id} onClick={()=>setAgId(a.id)}/>
          ))}
        </div>
      </div>

      {/* Agent banner */}
      <div style={{background:ag.l,borderBottom:`1px solid ${ag.b}`,
        padding:"9px 20px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <Ico d={IC[ag.icon]} size={14} color={ag.c}/>
        <span style={{fontSize:12,fontWeight:600,color:ag.c}}>{ag.name}</span>
        <span style={{fontSize:12,color:C.stone}}>— {ag.tagline}</span>
        <span style={{marginLeft:"auto",fontSize:10,color:C.txt3}}>via {ag.provider}</span>
      </div>

      {/* Starters */}
      {msgs.length<=1&&(
        <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.borderL}`}}>
          <p style={{fontSize:9,fontWeight:700,color:C.stone,letterSpacing:"0.5px",
            textTransform:"uppercase",marginBottom:8}}>Preguntas frecuentes</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {STARTERS.map((s,i)=>(
              <button key={i} onClick={()=>setInput(s)} style={{
                fontSize:12,color:ag.c,background:ag.l,
                border:`1px solid ${ag.c}30`,borderRadius:999,
                padding:"6px 12px",cursor:"pointer",transition:"all .12s"}}
                onMouseEnter={e=>{e.target.style.background=ag.c;e.target.style.color="#fff"}}
                onMouseLeave={e=>{e.target.style.background=ag.l;e.target.style.color=ag.c}}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}

      <div ref={chatEl} style={{flex:1,overflowY:"auto",padding:16,
        display:"flex",flexDirection:"column",gap:12}}>
        {msgs.map(m=>(
          <Bubble key={m.id} m={m} isUser={m.role==="user"} agentId={m.agentId||agId}/>
        ))}
        {loading&&(
          <div className="fi" style={{alignSelf:"flex-start"}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
              <Ico d={IC[ag.icon]} size={11} color={ag.c}/>
              <span style={{fontSize:11,fontWeight:600,color:ag.c}}>{ag.name}</span>
            </div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,
              borderRadius:"3px 14px 14px 14px",padding:"12px 18px"}}>
              <Dots color={ag.c}/>
            </div>
          </div>
        )}
      </div>

      <div style={{borderTop:`1px solid ${C.border}`,padding:"12px 16px",
        flexShrink:0,background:C.card}}>
        <Input value={input} onChange={e=>setInput(e.target.value)}
          onSend={()=>send()} placeholder={`Pregunta a ${ag.name} sobre anatomía…`}
          ac={ag.c} disabled={loading}/>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("home");
  const [topic,setTopic]=useState(null);

  useEffect(()=>{
    const el=document.getElementById("loading");
    if(el)setTimeout(()=>{el.classList.add("out");setTimeout(()=>el.remove(),400)},400);
  },[]);

  if(view==="session"&&topic)
    return <Session topic={topic} onBack={()=>setView("home")}/>;
  if(view==="free")
    return <FreeQuery onBack={()=>setView("home")}/>;
  return <Home
    onTopic={t=>{setTopic(t);setView("session");}}
    onFree={()=>setView("free")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
